name: Deploy service
run-name: >-
  Deploy -> ${{
    github.event_name == 'workflow_dispatch'
      && format('{0}-{1}', inputs.coin, inputs.network)
      || format('{0}-{1}', github.event.client_payload.coin, github.event.client_payload.network)
  }} ${{ github.event_name == 'workflow_dispatch' && '(manual)' || '(auto)' }}

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      coin:
        description: Coin
        required: true
        type: choice
        options:
          - tide
      network:
        description: Network
        required: true
        type: choice
        options:
          - testnet
          - mainnet
      sha:
        description: Commit SHA for deploy/rollback (default latest in branch)
        required: false
        default: ''
      confirm_mainnet:
        description: Type DEPLOY_MAINNET to confirm mainnet rollout (required only for mainnet)
        required: false
        default: ''
  repository_dispatch:
    types:
      - deploy

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', inputs.coin, inputs.network) || format('{0}-{1}', github.event.client_payload.coin, github.event.client_payload.network) }}
  cancel-in-progress: false

jobs:
  deployment:
    runs-on: self-hosted
    environment: ${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', inputs.coin, inputs.network) || format('{0}-{1}', github.event.client_payload.coin, github.event.client_payload.network) }}

    steps:
      - name: Block mainnet via repository_dispatch
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.network == 'mainnet'
        shell: bash
        run: |
          set -euo pipefail
          echo "Mainnet deploys must be triggered manually via workflow_dispatch."
          exit 1

      - name: Validate explicit mainnet confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.network == 'mainnet'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm_mainnet }}" != "DEPLOY_MAINNET" ]; then
            echo "Mainnet deploy requires explicit confirmation."
            echo "Re-run workflow_dispatch and set confirm_mainnet=DEPLOY_MAINNET"
            exit 1
          fi

      - name: Checkout repository for local actions
        uses: actions/checkout@v5

      - name: Resolve SERVICE_TAG
        uses: ./.github/actions/resolve-service-tag

      - name: Log SERVICE_TAG
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying image with SHA ${{ env.SERVICE_TAG }}"

      - name: Log in to Docker Registry
        shell: bash
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
          CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
          CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$CI_REGISTRY_PASSWORD" \
            | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin

      - name: Check if image exists
        uses: ./.github/actions/check-image-exists
        with:
          registry: ${{ secrets.CI_REGISTRY }}
          registry_repo: ${{ secrets.CI_REGISTRY_REPO }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_tag: ${{ env.SERVICE_TAG }}
          image_name: ${{ vars.IMAGE_NAME }}

      - name: Render service files from templates
        shell: bash
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
          CI_REGISTRY_REPO: ${{ secrets.CI_REGISTRY_REPO }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME || vars.SERVICE_NAME }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME }}
          CONTAINER_NAME: ${{ vars.CONTAINER_NAME || vars.TIDECOIN_CONTAINER_NAME }}
          TIDECOIN_CHAIN_FLAG: ${{ vars.TIDECOIN_CHAIN_FLAG }}
          TIDECOIN_LISTEN: ${{ vars.TIDECOIN_LISTEN }}
          TIDECOIN_MAX_CONNECTIONS: ${{ vars.TIDECOIN_MAX_CONNECTIONS }}
          TIDECOIN_RPC_PORT: ${{ vars.TIDECOIN_RPC_PORT }}
          TIDECOIN_RPC_BIND: ${{ vars.TIDECOIN_RPC_BIND }}
          TIDECOIN_RPC_ALLOW_IP: ${{ vars.TIDECOIN_RPC_ALLOW_IP }}
          TIDECOIN_TXINDEX: ${{ vars.TIDECOIN_TXINDEX }}
          TIDECOIN_P2P_PORT: ${{ vars.TIDECOIN_P2P_PORT }}
          TIDECOIN_RPCTHREADS: ${{ vars.TIDECOIN_RPCTHREADS || '32' }}
          TIDECOIN_MAX_FEE_RATE: ${{ vars.TIDECOIN_MAX_FEE_RATE || '10000000' }}
          TIDECOIN_WALLET_LINE: ${{ vars.TIDECOIN_WALLET_LINE }}
          BASIC_USER: ${{ secrets.BASIC_USER }}
          BASIC_PASS: ${{ secrets.BASIC_PASS }}
          COOKIE: ${{ secrets.COOKIE }}
        run: |
          set -euo pipefail
          if ! command -v envsubst >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gettext-base
          fi

          IMAGE="${CI_REGISTRY}/${CI_REGISTRY_REPO}/${IMAGE_NAME}:${SERVICE_TAG}"
          TIDECOIN_DAEMON_COMMAND="tidecoind -datadir=/data/node -conf=/data/tidecoin.conf -printtoconsole"
          TIDECOIN_HEALTHCHECK_COMMAND="tidecoin-cli -datadir=/data/node -conf=/data/tidecoin.conf getblockcount >/dev/null 2>&1 || exit 1"
          if [ -n "${TIDECOIN_CHAIN_FLAG}" ]; then
            TIDECOIN_DAEMON_COMMAND="${TIDECOIN_DAEMON_COMMAND} ${TIDECOIN_CHAIN_FLAG}"
            TIDECOIN_HEALTHCHECK_COMMAND="tidecoin-cli ${TIDECOIN_CHAIN_FLAG} -datadir=/data/node -conf=/data/tidecoin.conf getblockcount >/dev/null 2>&1 || exit 1"
          fi

          if [ -n "${COOKIE}" ]; then
            TIDECOIN_RPC_USER="${COOKIE%%:*}"
            TIDECOIN_RPC_PASSWORD="${COOKIE#*:}"
          else
            TIDECOIN_RPC_USER="${BASIC_USER}"
            TIDECOIN_RPC_PASSWORD="${BASIC_PASS}"
          fi

          RPC_USER="${TIDECOIN_RPC_USER}"
          RPC_PASSWORD="${TIDECOIN_RPC_PASSWORD}"
          RPC_PORT="${TIDECOIN_RPC_PORT}"
          P2P_PORT="${TIDECOIN_P2P_PORT}"

          export IMAGE TIDECOIN_DAEMON_COMMAND TIDECOIN_HEALTHCHECK_COMMAND
          export TIDECOIN_RPC_USER TIDECOIN_RPC_PASSWORD
          export RPC_USER RPC_PASSWORD RPC_PORT P2P_PORT

          envsubst < .github/templates/tidecoin.yml.template > tidecoin.yml.updated
          envsubst < .github/templates/tidecoin.conf.template > tidecoin.conf.updated
          envsubst < .github/templates/tidecoin.env.template > .env.updated

      - name: Copy rendered files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST_1 }}
          username: ${{ secrets.HOST_1_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "tidecoin.yml.updated,tidecoin.conf.updated,.env.updated"
          target: "/opt/${{ vars.COIN }}-${{ vars.NETWORK }}/services/${{ vars.SERVICE_NAME }}"

      - name: Deploy service
        uses: ./.github/actions/deploy-over-ssh
        with:
          host: ${{ secrets.HOST_1 }}
          username: ${{ secrets.HOST_1_USERNAME }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          registry: ${{ secrets.CI_REGISTRY }}
          registry_repo: ${{ secrets.CI_REGISTRY_REPO }}
          service_name: ${{ vars.SERVICE_NAME }}
          service_tag: ${{ env.SERVICE_TAG }}
          docker_compose_file: ${{ vars.DOCKER_COMPOSE_FILE }}
          coin: ${{ vars.COIN }}
          network: ${{ vars.NETWORK }}
          container_name: ${{ vars.CONTAINER_NAME || vars.TIDECOIN_CONTAINER_NAME }}
          image_name: ${{ vars.IMAGE_NAME }}
          service_compose_file: ${{ vars.SERVICE_COMPOSE_FILE }}
          compose_updated_file: tidecoin.yml.updated
          config_updated_file: tidecoin.conf.updated
          env_updated_file: .env.updated
          post_deploy_sleep_seconds: "10"
          reload_nginx: "false"

      - name: Docker logout
        if: always()
        shell: bash
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
        run: |
          set +e
          docker logout "$CI_REGISTRY"
          exit 0
