name: Build and release Docker image
run-name: >-
  Build & release -> ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'tide-testnet' }}

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA for build (default: latest in branch)'
        required: false
        default: ''
      target:
        description: 'Auto-deploy target after build (mainnet is never auto-deployed)'
        required: true
        type: choice
        default: tide-testnet
        options:
          - tide-testnet
          - none
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-entrypoint.sh'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'depends/**'
      - 'cmake/**'
      - 'src/**'
      - 'share/**'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  semgrep-cpp:
    runs-on: self-hosted
    environment: tide-testnet
    permissions:
      contents: read

    steps:
      - name: Resolve SCAN_REF
        shell: bash
        env:
          INPUT_SHA: ${{ github.event.inputs.sha }}
          GITHUB_SHA_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SHA" ]; then
            echo "SCAN_REF=$INPUT_SHA" >> "$GITHUB_ENV"
          else
            echo "SCAN_REF=$GITHUB_SHA_REF" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository at selected commit
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SCAN_REF }}

      - name: Install Semgrep
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3-pip pipx
          pipx ensurepath
          pipx install semgrep || pipx upgrade semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Report all (non-blocking)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          semgrep --config p/cpp .

      - name: Fail on WARNING
        shell: bash
        run: |
          set -euo pipefail
          semgrep --config p/cpp --severity WARNING --error .

      - name: Fail on ERROR
        shell: bash
        run: |
          set -euo pipefail
          semgrep --config p/cpp --severity ERROR --error .

  build:
    runs-on: self-hosted
    environment: tide-testnet
    needs: semgrep-cpp
    outputs:
      service_tag: ${{ steps.tag.outputs.service_tag }}

    steps:
      - name: Resolve SERVICE_TAG
        id: tag
        shell: bash
        env:
          INPUT_SHA: ${{ github.event.inputs.sha }}
          GITHUB_SHA_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SHA" ]; then
            echo "SERVICE_TAG=$INPUT_SHA" >> "$GITHUB_ENV"
            echo "service_tag=$INPUT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "SERVICE_TAG=$GITHUB_SHA_REF" >> "$GITHUB_ENV"
            echo "service_tag=$GITHUB_SHA_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Log SERVICE_TAG
        shell: bash
        run: |
          set -euo pipefail
          echo "Building image with SHA ${{ env.SERVICE_TAG }}"

      - name: Checkout repository at selected commit
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SERVICE_TAG }}

      - name: Log in to Docker Registry
        shell: bash
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
          CI_REGISTRY_USER: ${{ secrets.CI_REGISTRY_USER }}
          CI_REGISTRY_PASSWORD: ${{ secrets.CI_REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$CI_REGISTRY_PASSWORD" \
            | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin

      - name: Build and release Docker image
        shell: bash
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
          CI_REGISTRY_REPO: ${{ secrets.CI_REGISTRY_REPO }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME || vars.SERVICE_NAME }}
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          IMAGE="${CI_REGISTRY}/${CI_REGISTRY_REPO}/${IMAGE_NAME}"
          docker build \
            --pull \
            --label "org.opencontainers.image.revision=${SERVICE_TAG}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            -f ./Dockerfile \
            -t "${IMAGE}:${SERVICE_TAG}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:testnet-latest" \
            ./
          docker push "${IMAGE}:${SERVICE_TAG}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:testnet-latest"

      - name: Docker logout
        if: always()
        shell: bash
        env:
          CI_REGISTRY: ${{ secrets.CI_REGISTRY }}
        run: |
          set +e
          docker logout "$CI_REGISTRY"
          exit 0

  fanout-deploy:
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target != 'none')
    strategy:
      fail-fast: false
      matrix:
        coin: [tide]
    steps:
      - name: Decide whether to dispatch
        id: gate
        shell: bash
        env:
          TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'tide-testnet' }}
          COIN: ${{ matrix.coin }}
        run: |
          set -euo pipefail
          if [ "$TARGET" = "${COIN}-testnet" ]; then
            echo "fire=true" >> "$GITHUB_OUTPUT"
          else
            echo "fire=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository for local actions
        if: steps.gate.outputs.fire == 'true'
        uses: actions/checkout@v5

      - name: Trigger testnet deploy
        if: steps.gate.outputs.fire == 'true'
        uses: ./.github/actions/repository-dispatch
        with:
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          repository: ${{ github.repository }}
          event_type: deploy
          client_payload: |
            {
              "coin": "${{ matrix.coin }}",
              "network": "testnet",
              "sha": "${{ needs.build.outputs.service_tag }}",
              "ref": "${{ github.ref }}"
            }
